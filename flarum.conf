# 处理 HTTP 请求（8000 端口）
server {
    listen 8000;
    listen [::]:8000;
    # server_name your-domain.com;   # 替换为你的实际域名或服务器 IP

    # 日志（可选，便于调试）
    access_log /var/log/nginx/flarum_access.log;
    error_log /var/log/nginx/flarum_error.log;

    # Flarum 的 public 目录
    root /opt/flarum/public;
    index index.php;

    # 导入 Flarum 官方提供的重写规则（确保该文件存在）
    include /opt/flarum/.nginx.conf;

    # 处理 PHP 请求
    location ~ \.php$ {
        # 根据你的 PHP-FPM 配置选择 socket 或 TCP
        # fastcgi_pass unix:/var/run/php-fpm/www.sock;
        # 如果使用 TCP：fastcgi_pass 127.0.0.1:9000;
        fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 静态资源缓存（可选，提升性能）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件（如 .env, .git 等）
    location ~ /\. {
        deny all;
    }

    # 禁止访问某些敏感目录
    location ^~ /storage {
        deny all;
    }
}

